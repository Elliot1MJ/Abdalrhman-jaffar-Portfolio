        />
        <meta name="twitter:image" content="/images/hero.webp" />
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "Person",
                "name": "Abdalrhman Mohammed Jaffar",
                "alternateName": "عبد الرحمن محمد جعفر",
                "jobTitle": "Frontend Developer",
                "description": "Frontend Developer specialized in React.js and TypeScript dashboards, booking systems, and tracking platforms.",
                "address": {
                    "@type": "PostalAddress",
                    "addressLocality": "Lattakia",
                    "addressCountry": "SY"
                },
                "sameAs": ["https://www.instagram.com/abdalrhman_jaffar/"]
            }
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module">
            const PREBOOT_BLOCK_ID = "inspect-preboot-block";
            const PREBOOT_STYLE_ID = "inspect-preboot-style";
            const EDGE_THRESHOLD = 150;
            const DEBUGGER_LAG_MS = 130;
            const CHECK_INTERVAL_MS = 650;
            let isBlocked = false;

            const isArabic =
                document.documentElement.lang.startsWith("ar") ||
                document.documentElement.dir === "rtl";
            const copy = isArabic
                ? {
                      eyebrow: "تنبيه أمني",
                      title: "تم حظر الوصول",
                      hint: "تم اكتشاف فتح أدوات المطوّر قبل تحميل الموقع، لذلك تم إيقاف عرض الصفحة لحماية ملفات الواجهة. أغلق أدوات المطوّر ثم أعد تحميل الصفحة.",
                      action: "أغلقت أدوات المطوّر",
                  }
                : {
                      eyebrow: "Security Notice",
                      title: "Access Blocked",
                      hint: "Developer tools were detected before the website loaded, so rendering was paused to protect frontend assets. Close DevTools, then reload the page.",
                      action: "I Closed DevTools",
                  };

            const isCoarsePointerDevice = () =>
                window.matchMedia("(hover: none) and (pointer: coarse)")
                    .matches;

            const isDevToolsByLayout = () => {
                const widthGap = window.outerWidth - window.innerWidth;
                const heightGap = window.outerHeight - window.innerHeight;
                return widthGap > EDGE_THRESHOLD || heightGap > EDGE_THRESHOLD;
            };

            const isDevToolsByDebugger = () => {
                const start = performance.now();
                // eslint-disable-next-line no-debugger
                debugger;
                return performance.now() - start > DEBUGGER_LAG_MS;
            };

            const isDevToolsOpen = () => {
                if (isCoarsePointerDevice()) {
                    return false;
                }

                return isDevToolsByLayout() || isDevToolsByDebugger();
            };

            const ensureStyles = () => {
                if (document.getElementById(PREBOOT_STYLE_ID)) {
                    return;
                }

                const style = document.createElement("style");
                style.id = PREBOOT_STYLE_ID;
                style.textContent = `
                    #${PREBOOT_BLOCK_ID} {
                        position: fixed;
                        inset: 0;
                        z-index: 2147483647;
                        display: grid;
                        place-items: center;
                        padding: 16px;
                        overflow: hidden;
                        color: #f4f4f5;
                        font-family: "Space Grotesk", "Cairo", "Poppins", "Trebuchet MS", sans-serif;
                        text-align: center;
                        background:
                            radial-gradient(100% 70% at 50% -15%, rgba(168, 85, 247, 0.2), transparent 60%),
                            radial-gradient(65% 55% at 85% 105%, rgba(168, 85, 247, 0.14), transparent 70%),
                            radial-gradient(55% 45% at 10% 95%, rgba(168, 85, 247, 0.1), transparent 70%),
                            linear-gradient(180deg, #0b0b10 0%, #0a0a0f 46%, rgba(11, 11, 16, 0.98) 100%);
                    }

                    #${PREBOOT_BLOCK_ID}::before {
                        content: "";
                        position: absolute;
                        inset: 0;
                        pointer-events: none;
                        background-image:
                            linear-gradient(to right, rgba(244, 244, 245, 0.08) 1px, transparent 1px),
                            linear-gradient(to bottom, rgba(244, 244, 245, 0.08) 1px, transparent 1px);
                        background-size: 56px 56px;
                        opacity: 0.34;
                    }

                    #${PREBOOT_BLOCK_ID} .guard-wrap {
                        position: relative;
                        width: min(92vw, 880px);
                        max-height: 96vh;
                        overflow: hidden;
                    }

                    #${PREBOOT_BLOCK_ID} .guard-card {
                        position: relative;
                        overflow: hidden;
                        border: 1px solid rgba(244, 244, 245, 0.14);
                        border-radius: 32px;
                        padding: clamp(20px, 4vw, 34px);
                        background:
                            radial-gradient(120% 90% at 50% -20%, rgba(168, 85, 247, 0.2), transparent 56%),
                            linear-gradient(160deg, rgba(20, 20, 28, 0.88) 0%, rgba(10, 10, 16, 0.92) 100%);
                        box-shadow:
                            0 40px 90px -60px rgba(0, 0, 0, 0.95),
                            inset 0 1px 0 rgba(255, 255, 255, 0.06);
                        backdrop-filter: blur(8px);
                    }

                    #${PREBOOT_BLOCK_ID} .guard-figure {
                        width: min(74vw, 480px);
                        margin-inline: auto;
                        display: block;
                        object-fit: contain;
                        border: none;
                        border-radius: 0;
                        background: transparent;
                        filter:
                            hue-rotate(-22deg)
                            saturate(1.22)
                            contrast(1.06)
                            brightness(0.94)
                            drop-shadow(0 24px 38px rgba(92, 57, 186, 0.3));
                    }

                    #${PREBOOT_BLOCK_ID} .guard-alert {
                        margin: 12px 0 0;
                        font-size: 12px;
                        letter-spacing: 0.2em;
                        text-transform: uppercase;
                        color: rgba(212, 212, 216, 0.76);
                    }

                    #${PREBOOT_BLOCK_ID} .guard-code {
                        margin: 14px 0 8px;
                        font-size: clamp(56px, 12vw, 110px);
                        line-height: 0.9;
                        letter-spacing: 0.04em;
                        font-weight: 700;
                        text-transform: uppercase;
                        color: #f4f4f5;
                    }

                    #${PREBOOT_BLOCK_ID} .guard-title {
                        margin: 0;
                        font-size: clamp(22px, 4vw, 44px);
                        line-height: 1.1;
                        font-weight: 700;
                        color: #d4d4d8;
                    }

                    #${PREBOOT_BLOCK_ID} .guard-hint {
                        margin: 12px auto 0;
                        max-width: 580px;
                        font-size: clamp(13px, 2vw, 18px);
                        line-height: 1.6;
                        color: rgba(161, 161, 170, 0.95);
                    }

                    #${PREBOOT_BLOCK_ID} .guard-actions {
                        margin-top: 18px;
                        display: flex;
                        justify-content: center;
                    }

                    #${PREBOOT_BLOCK_ID} .guard-btn {
                        border: 1px solid rgba(244, 244, 245, 0.2);
                        border-radius: 999px;
                        padding: 10px 18px;
                        font-size: 13px;
                        letter-spacing: 0.16em;
                        text-transform: uppercase;
                        font-weight: 700;
                        color: #f4f4f5;
                        background: linear-gradient(135deg, rgba(168, 85, 247, 0.65) 0%, rgba(111, 43, 230, 0.7) 100%);
                        box-shadow: 0 16px 28px -18px rgba(168, 85, 247, 0.8);
                        cursor: pointer;
                        transition: transform 140ms ease, filter 140ms ease;
                    }

                    #${PREBOOT_BLOCK_ID} .guard-btn:hover {
                        transform: translateY(-1px);
                        filter: brightness(1.06);
                    }

                    #${PREBOOT_BLOCK_ID} .guard-btn:active {
                        transform: translateY(0);
                    }
                `;
                document.head.appendChild(style);
            };

            const mountGuard = () => {
                if (document.getElementById(PREBOOT_BLOCK_ID)) {
                    return;
                }
                isBlocked = true;
                ensureStyles();

                const block = document.createElement("div");
                block.id = PREBOOT_BLOCK_ID;
                block.innerHTML = `
                    <main class="guard-wrap" aria-live="assertive">
                        <section class="guard-card">
                            <img
                                class="guard-figure"
                                src="/images/access-403.svg"
                                alt="Access blocked illustration"
                            />
                            <p class="guard-alert">${copy.eyebrow}</p>
                            <h1 class="guard-code">403</h1>
                            <p class="guard-title">${copy.title}</p>
                            <p class="guard-hint">${copy.hint}</p>
                            <div class="guard-actions">
                                <button class="guard-btn" type="button" data-action="reload">
                                    ${copy.action}
                                </button>
                            </div>
                        </section>
                    </main>
                `;

                if (document.body) {
                    document.body.appendChild(block);
                }
                block.addEventListener("click", (event) => {
                    const element = event.target;
                    if (
                        element instanceof HTMLElement &&
                        element.closest('[data-action="reload"]')
                    ) {
                        window.location.reload();
                    }
                });
                document.documentElement.style.overflow = "hidden";
                if (document.body) {
                    document.body.style.overflow = "hidden";
                }
            };

            const runGuard = () => {
                if (isBlocked) {
                    return;
                }
                if (isDevToolsOpen()) {
                    mountGuard();
                }
            };

            runGuard();
            window.addEventListener("focus", runGuard, { passive: true });
            window.addEventListener("resize", runGuard, { passive: true });
            window.setInterval(runGuard, CHECK_INTERVAL_MS);

            if (!isBlocked) {
                import("/src/main.tsx");
            }
        </script>
    </body>
</html>
