<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Offline | Portfolio</title>
        <style>
            :root {
                color-scheme: dark;
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
            }

            body {
                display: grid;
                place-items: center;
                overflow: hidden;
                font-family:
                    "Space Grotesk", "Poppins", "Segoe UI", "Trebuchet MS",
                    sans-serif;
                background-color: #0b0b10;
                background-image:
                    radial-gradient(
                        100% 70% at 50% -15%,
                        rgba(168, 85, 247, 0.2),
                        transparent 60%
                    ),
                    radial-gradient(
                        65% 55% at 85% 105%,
                        rgba(168, 85, 247, 0.14),
                        transparent 70%
                    ),
                    radial-gradient(
                        55% 45% at 10% 95%,
                        rgba(168, 85, 247, 0.1),
                        transparent 70%
                    ),
                    linear-gradient(
                        180deg,
                        #0b0b10 0%,
                        #0a0a0f 46%,
                        rgba(11, 11, 16, 0.98) 100%
                    );
                color: #f4f4f5;
            }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                pointer-events: none;
                background-image:
                    linear-gradient(
                        to right,
                        rgba(244, 244, 245, 0.08) 1px,
                        transparent 1px
                    ),
                    linear-gradient(
                        to bottom,
                        rgba(244, 244, 245, 0.08) 1px,
                        transparent 1px
                    );
                background-size: 56px 56px;
                opacity: 0.3;
            }

            .offline-wrap {
                width: min(92vw, 840px);
                text-align: center;
                padding: 12px;
            }

            .offline-card {
                position: relative;
                overflow: hidden;
                border: 1px solid rgba(244, 244, 245, 0.14);
                border-radius: 32px;
                padding: clamp(20px, 4vw, 34px);
                background:
                    radial-gradient(
                        120% 90% at 50% -20%,
                        rgba(168, 85, 247, 0.2),
                        transparent 56%
                    ),
                    linear-gradient(
                        160deg,
                        rgba(20, 20, 28, 0.88) 0%,
                        rgba(10, 10, 16, 0.92) 100%
                    );
                box-shadow:
                    0 40px 90px -60px rgba(0, 0, 0, 0.95),
                    inset 0 1px 0 rgba(255, 255, 255, 0.06);
                backdrop-filter: blur(6px);
            }

            .brand {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 8px;
            }

            .brand-mark {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                border: 1px solid rgba(244, 244, 245, 0.24);
                display: grid;
                place-items: center;
                background: rgba(11, 11, 16, 0.75);
                color: #f4f4f5;
                font-size: 14px;
                line-height: 1;
            }

            .brand-text {
                text-align: left;
                line-height: 1.05;
            }

            .brand-text span {
                display: block;
            }

            .brand-eyebrow {
                font-size: 10px;
                letter-spacing: 0.28em;
                text-transform: uppercase;
                color: rgba(212, 212, 216, 0.7);
            }

            .brand-name {
                margin-top: 3px;
                font-size: 13px;
                color: #f4f4f5;
                font-weight: 600;
            }

            .router-figure {
                width: min(72vw, 460px);
                margin-inline: auto;
                display: block;
                filter: drop-shadow(0 24px 42px rgba(72, 50, 146, 0.3));
            }

            .title {
                margin: 20px 0 8px;
                font-size: clamp(48px, 10vw, 92px);
                line-height: 0.95;
                letter-spacing: 0.04em;
                font-weight: 700;
                text-transform: uppercase;
                color: #f4f4f5;
            }

            .subtitle {
                margin: 0;
                font-size: clamp(22px, 4vw, 44px);
                line-height: 1.1;
                font-weight: 700;
                color: #d4d4d8;
            }

            .hint {
                margin: 12px auto 0;
                max-width: 560px;
                font-size: clamp(13px, 2vw, 18px);
                color: rgba(161, 161, 170, 0.95);
            }

            .actions {
                margin-top: 18px;
            }

            .retry-btn {
                border: 1px solid rgba(244, 244, 245, 0.2);
                border-radius: 999px;
                padding: 10px 18px;
                font-size: 13px;
                letter-spacing: 0.16em;
                text-transform: uppercase;
                font-weight: 700;
                color: #f4f4f5;
                background: linear-gradient(
                    135deg,
                    rgba(168, 85, 247, 0.65) 0%,
                    rgba(111, 43, 230, 0.7) 100%
                );
                box-shadow: 0 16px 28px -18px rgba(168, 85, 247, 0.8);
                cursor: pointer;
                transition:
                    transform 140ms ease,
                    filter 140ms ease;
            }

            .retry-btn:hover {
                transform: translateY(-1px);
                filter: brightness(1.06);
            }

            .retry-btn:active {
                transform: translateY(0);
            }
        </style>
    </head>
    <body>
        <main class="offline-wrap" role="main" aria-live="polite">
            <section class="offline-card">
                <div class="brand">
                    <span class="brand-mark">&lt;/&gt;</span>
                    <span class="brand-text">
                        <span class="brand-eyebrow">Portfolio</span>
                        <span class="brand-name">Abdalrhman</span>
                    </span>
                </div>

                <svg
                    class="router-figure"
                    viewBox="0 0 520 310"
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    aria-hidden="true"
                >
                    <ellipse
                        cx="258"
                        cy="235"
                        rx="180"
                        ry="42"
                        fill="#6f79dc"
                        fill-opacity="0.46"
                    />
                    <rect
                        x="84"
                        y="104"
                        width="352"
                        height="130"
                        rx="44"
                        fill="#f5f2ff"
                    />
                    <path
                        d="M152 98L122 12"
                        stroke="#f5f2ff"
                        stroke-width="14"
                        stroke-linecap="round"
                    />
                    <circle cx="168" cy="170" r="14" fill="#fb1b72" />
                    <circle cx="226" cy="170" r="11" fill="#b0b6f4" />
                    <path
                        d="M344 176C335 196 308 194 300 176"
                        stroke="#b0b6f4"
                        stroke-width="10"
                        stroke-linecap="round"
                    />
                    <path
                        d="M430 176C421 196 394 194 386 176"
                        stroke="#b0b6f4"
                        stroke-width="10"
                        stroke-linecap="round"
                    />
                    <circle cx="204" cy="236" r="19" fill="#4657cc" />
                    <circle cx="340" cy="236" r="19" fill="#4657cc" />
                </svg>

                <h1 class="title">Offline</h1>
                <p class="subtitle">No internet connection.</p>
                <p class="hint">Please reconnect and then refresh this page.</p>

                <div class="actions">
                    <button
                        class="retry-btn"
                        type="button"
                        aria-label="Reload page"
                        onclick="window.location.reload()"
                    >
                        Reload
                    </button>
                </div>
            </section>
        </main>
        <script>
            window.addEventListener("online", () => {
                window.location.reload();
            });
        </script>
    </body>
</html>
